<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中学生计算机考试选择题测试</title>
  <style>
    body {
      margin: 0; padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f3f4f6; color: #111827; line-height: 1.6;
    }
    .top-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .question {
      margin-bottom: 20px; padding: 20px;
      border: 2px solid #e5e7eb; border-radius: 12px;
      background-color: #ffffff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    .question.correct-question {
      border-color: #22c55e; background-color: #f0fdf4;
      box-shadow: 0 4px 12px rgba(34,197,94,0.2);
    }
    .question.incorrect-question {
      border-color: #ef4444; background-color: #fef2f2;
      box-shadow: 0 4px 12px rgba(239,68,68,0.2);
    }
    .question:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.12); }
    .question h3 { margin: 0 0 15px; font-size: 1.25rem; color: #1f2937; }
    .question label { display: block; margin-bottom: 10px; font-size: 1rem; color: #374151; cursor: pointer; }
    .question input[type="radio"] { margin-right: 10px; }

    .correct-answer {
      background-color: #dcfce7;
      border-left: 4px solid #22c55e;
      padding-left: 8px;
      border-radius: 4px;
      font-weight: 600;
      color: #166534;
    }
    .answer-hint { margin-top: 10px; color: #166534; font-weight: bold; }
    .submit-btn {
      padding: 12px 28px; font-size: 1rem; font-weight: 600;
      color: #fff; background-color: #2563eb; border: none; border-radius: 8px;
      cursor: pointer; transition: background-color 0.2s ease;
      margin-top: 20px;
    }
    .submit-btn:hover { background-color: #1d4ed8; }

    .cheat-btn {
      padding: 18px 38px;
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #dc2626);
      color: #fff;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.7);
      animation: glow 1.5s infinite alternate;
      position: relative;
      z-index: 9999;
    }
    @keyframes glow {
      from { box-shadow: 0 0 15px rgba(239, 68, 68, 0.7); }
      to { box-shadow: 0 0 35px rgba(239, 68, 68, 1), 0 0 60px rgba(239, 68, 68, 0.5); }
    }
    .reset-btn {
      background-color: #6d28d9; margin-left: 10px;
    }
    .reset-btn:hover { background-color: #5b21b6; }
    .result {
      margin-top: 30px; padding: 20px; border: 1px solid #e5e7eb;
      border-radius: 12px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .result h2 { margin-top: 0; color: #1f2937; }
    .scroll-link {
      display: inline-block; margin-right: 15px; margin-bottom: 8px;
      color: #1e40af; text-decoration: none; font-weight: 500; border-bottom: 1px dashed #1e40af;
    }
    .scroll-link:hover { color: #1d4ed8; border-bottom-style: solid; }
    .summary { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h1>中学生计算机考试选择题测试</h1>

  <div class="top-bar">
    <button type="button" class="cheat-btn" id="cheatBtn">🪄 求你了给我满分</button>
  </div>

  <form id="quizForm">
    <div id="questionsContainer"></div>
    <button type="submit" class="submit-btn" id="submitBtn">提交</button>
  </form>

  <div id="resultContainer" class="result" style="display: none;"></div>

  <script src="questions.js"></script>
  <script>
    const allQuestions = JSON.parse(decodeURIComponent(escape(atob(QUESTIONS_ENCODED))));
    let quizQuestions = [];
    const questionsContainer = document.getElementById("questionsContainer");
    const resultContainer = document.getElementById("resultContainer");
    const cheatBtn = document.getElementById("cheatBtn");
    const submitBtn = document.getElementById("submitBtn");

    function renderQuestions() {
      questionsContainer.innerHTML = '';
      quizQuestions = allQuestions.sort(() => Math.random() - 0.5).slice(0, 40);

      quizQuestions.forEach((q, index) => {
        const questionDiv = document.createElement("div");
        questionDiv.className = "question";
        questionDiv.id = `question-${index}`;

        const questionTitle = document.createElement("h3");
        questionTitle.textContent = `${index + 1}. ${q.question}`;
        questionDiv.appendChild(questionTitle);

        q.options.forEach((option, i) => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = `question-${index}`;
          input.value = i;
          label.appendChild(input);
          label.appendChild(document.createTextNode(option));
          questionDiv.appendChild(label);
        });

        questionsContainer.appendChild(questionDiv);
      });
    }

    function resetQuiz() {
      resultContainer.innerHTML = '';
      resultContainer.style.display = 'none';
      cheatBtn.style.position = "relative";
      cheatBtn.style.left = "";
      cheatBtn.style.top = "";
      renderQuestions();
    }

    function autoAllCorrect() {
      quizQuestions.forEach((q, index) => {
        const radios = document.getElementsByName(`question-${index}`);
        radios.forEach(radio => {
          radio.checked = (parseInt(radio.value) === q.answer);
        });
      });
      evaluateQuiz();
    }

    function evaluateQuiz() {
      let correctCount = 0;
      resultContainer.innerHTML = '';
      const errorList = [];

      quizQuestions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="question-${index}"]:checked`);
        const questionDiv = document.getElementById(`question-${index}`);
        const isCorrect = selected && parseInt(selected.value) === q.answer;

        const prevCorrectLabel = questionDiv.querySelector('.correct-answer');
        if (prevCorrectLabel) prevCorrectLabel.classList.remove('correct-answer');
        const prevHint = questionDiv.querySelector('.answer-hint');
        if (prevHint) prevHint.remove();

        if (isCorrect) {
          correctCount++;
          questionDiv.className = 'question correct-question';
        } else {
          questionDiv.className = 'question incorrect-question';
          const labels = questionDiv.querySelectorAll('label');
          if (labels.length > 0 && q.answer >= 0 && q.answer < labels.length) {
            labels[q.answer].classList.add('correct-answer');
          }
          const hint = document.createElement('p');
          hint.className = 'answer-hint';
          hint.textContent = `正确答案：${q.options[q.answer]}`;
          questionDiv.appendChild(hint);
          errorList.push({ index, question: q.question });
        }
      });

      const accuracy = ((correctCount / quizQuestions.length) * 100).toFixed(2);
      let html = `<div class="summary">✅ 正确率：${accuracy}% &nbsp; | &nbsp; 正确数量：${correctCount} / ${quizQuestions.length}</div>`;

      if (errorList.length > 0) {
        html += `<div class="error-list"><strong>🔴 错误/未答题目（点击跳转）：</strong><br>`;
        errorList.forEach(err => {
          html += `<a href="#question-${err.index}" class="scroll-link">📌 第 ${err.index + 1} 题</a>`;
        });
        html += `</div>`;
      } else {
        html += `<p>🎉 全部正确，太棒了！</p>`;
      }

      html += `<button type="button" class="reset-btn submit-btn" onclick="resetQuiz()">🔄 再来一次</button>`;
      resultContainer.innerHTML = html;
      resultContainer.style.display = 'block';
    }

    submitBtn.addEventListener("click", function(e) {
      e.preventDefault();
      evaluateQuiz();
    });

    renderQuestions();

    let cheatPosX = 0;
    let cheatPosY = 0;
    let targetX = 0;
    let targetY = 0;
    let isCheatMoving = false;
    let cheatFixed = false;
    let currentSpeed = 8;

    function moveCheatSmoothly() {
      const dx = targetX - cheatPosX;
      const dy = targetY - cheatPosY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 1) {
        isCheatMoving = false;
        return;
      }

      cheatPosX += (dx / distance) * currentSpeed;
      cheatPosY += (dy / distance) * currentSpeed;
      cheatBtn.style.left = cheatPosX + "px";
      cheatBtn.style.top = cheatPosY + "px";

      requestAnimationFrame(moveCheatSmoothly);
    }

    cheatBtn.addEventListener("mouseenter", function() {
      if (window.innerWidth <= 768 || /Mobi|Android/i.test(navigator.userAgent)) return;

      if (isCheatMoving) return;

      if (!cheatFixed) {
        const rect = cheatBtn.getBoundingClientRect();
        cheatPosX = rect.left;
        cheatPosY = rect.top;
        cheatBtn.style.position = "fixed";
        cheatBtn.style.left = cheatPosX + "px";
        cheatBtn.style.top = cheatPosY + "px";
        cheatBtn.style.margin = "0";
        cheatFixed = true;
      }

      const btnW = cheatBtn.offsetWidth;
      const btnH = cheatBtn.offsetHeight;
      const maxX = window.innerWidth - btnW - 10;
      const maxY = window.innerHeight - btnH - 10;

      // 生成初始随机目标
      targetX = Math.random() * maxX;
      targetY = Math.random() * maxY;

      const dist = Math.sqrt((targetX - cheatPosX) ** 2 + (targetY - cheatPosY) ** 2);

      if (dist < 50) {
        currentSpeed = 12;
        const corners = [
          { x: 0, y: 0 },
          { x: maxX, y: 0 },
          { x: 0, y: maxY },
          { x: maxX, y: maxY }
        ];
        const chosen = corners[Math.floor(Math.random() * 4)];
        const cornerDist = Math.sqrt((chosen.x - cheatPosX) ** 2 + (chosen.y - cheatPosY) ** 2);
        if (cornerDist < 200) {
          const opposite = corners.find(c => c.x !== chosen.x && c.y !== chosen.y) || corners[Math.floor(Math.random() * 4)];
          targetX = opposite.x;
          targetY = opposite.y;
        } else {
          targetX = chosen.x;
          targetY = chosen.y;
        }
      } else {
        currentSpeed = 8;
      }

      isCheatMoving = true;
      moveCheatSmoothly();
    });

    cheatBtn.addEventListener("click", function() {
      if (window.innerWidth <= 768 || /Mobi|Android/i.test(navigator.userAgent)) {
        alert("杂鱼手机端还是不要参与了");
        return;
      }
      alert("你居然点到了！");
      cheatBtn.style.position = "static";
      autoAllCorrect();
    });
  </script>
</body>
</html>
