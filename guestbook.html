<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板</title>
  <style>
    body {
      margin: 0; padding: 24px;
      background: #f3f4f6; color: #1f2937;
      font-family: 'Segoe UI', sans-serif;
      max-width: 600px; margin: 40px auto;
    }
    h1 { color: #be185d; }
    .message-form {
      display: flex; gap: 10px; margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem;
    }
    button {
      background: #be185d; color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer;
    }
    .message-list {
      list-style: none; padding: 0;
    }
    .message-item {
      background: #fff; padding: 14px 18px; border-radius: 12px; margin-bottom: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      display: flex; justify-content: space-between;
    }
    .delete-btn {
      background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>📝 留言板</h1>
  <div class="message-form">
    <input type="text" id="messageInput" placeholder="说点什么…" maxlength="200">
    <button id="sendBtn">发送</button>
  </div>
  <ul class="message-list" id="messageList"></ul>

  <script src="guestbook.js"></script>
</body>
</html>
